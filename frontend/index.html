<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>EVENTIFY</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/OMC.png" alt="omc logo">
            <h1>Eventify</h1>
        </div>
        <ul class="links">
            <li><a href="#">About the event</a></li>
            <li><a href="#">Register</a></li>
        </ul>
    </header>


    <section class="main">
        <div class="text">
            <h1 class="text-t"><span class="text-s">Join the adventure</span><br>
            with <span class="eventify"> Eventify</span></h1>
        </div>
        <div class="parg">
            <img src="images/Sahm.png" alt="sahm" class="sahm">
            <p>By Open Minds Club</p>
        </div>
        <div class="time">
            <p class="time-text">Our event is in :</p>
            <div class="countdown">
                <div class="box">
                    <h2 id="days">09</h2>
                    <p>Days</p>
                </div>
                <div class="box">
                    <h2 id="hours">20</h2>
                    <p>Hours</p>
                </div>
                <div class="box">
                    <h2 id="minutes">30</h2>
                    <p>Minutes</p>
                </div>
                <div class="box">
                    <h2 id="seconds">07</h2>
                    <p>Seconds</p>
                </div>
            </div>
        </div>
        <div class="btn">
            <a href="#">Register now</a>
        </div>
    </section>



</body>
</html>
